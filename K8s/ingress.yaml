# Two hosts:
#   matrix.kodloki.io  -> Synapse (client API + .well-known so apps auto-discover)
#   element.kodloki.io -> Element web client
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synapse
  namespace: matrix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Matrix media uploads; keep in sync with max_upload_size in homeserver.yaml.
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  labels:
    app: synapse
spec:
  ingressClassName: nginx
  tls:
    - hosts: [matrix.kodloki.io]
      secretName: synapse-tls
  rules:
    - host: matrix.kodloki.io
      http:
        paths:
          - path: /_matrix
            pathType: Prefix
            backend:
              service:
                name: synapse
                port: { number: 8008 }
          - path: /_synapse
            pathType: Prefix
            backend:
              service:
                name: synapse
                port: { number: 8008 }
          - path: /.well-known/matrix
            pathType: Prefix
            backend:
              service:
                name: synapse
                port: { number: 8008 }
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: element
  namespace: matrix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  labels:
    app: element
spec:
  ingressClassName: nginx
  tls:
    - hosts: [element.kodloki.io]
      secretName: element-tls
  rules:
    - host: element.kodloki.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: element
                port: { number: 80 }
