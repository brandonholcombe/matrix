# TEMPLATE — committed for reference. Do NOT put real values here.
# This Secret is mounted at /secrets/secrets.yaml and merged into Synapse's config
# at startup. It holds every secret value: the DB connection (with password) and
# the three server secrets. The DB block lives HERE (not in the configmap) so the
# password never touches a committed file.
#
# Create the real secret with:
#   kubectl -n matrix create secret generic synapse-secrets \
#     --from-file=secrets.yaml=./secret-synapse.yaml
# ...where secret-synapse.yaml is your gitignored, filled-in copy of the block below.
apiVersion: v1
kind: Secret
metadata:
  name: synapse-secrets
  namespace: matrix
type: Opaque
stringData:
  secrets.yaml: |
    database:
      name: psycopg2
      args:
        user: synapse
        password: "REPLACE_ME_PG_PASSWORD"
        dbname: synapse
        host: matrix-postgres
        port: 5432
        cp_min: 5
        cp_max: 10
    registration_shared_secret: "REPLACE_ME_REG_SHARED_SECRET"
    macaroon_secret_key: "REPLACE_ME_MACAROON_SECRET"
    form_secret: "REPLACE_ME_FORM_SECRET"
