# TEMPLATE for the coturn shared secret. Create the real one with:
#   kubectl -n matrix create secret generic coturn-secret \
#     --from-literal=TURN_SECRET='<generated with: openssl rand -hex 32>'
# The SAME value must go into secret-synapse.yaml as `turn_shared_secret`.
apiVersion: v1
kind: Secret
metadata:
  name: coturn-secret
  namespace: matrix
type: Opaque
stringData:
  TURN_SECRET: "REPLACE_ME"
