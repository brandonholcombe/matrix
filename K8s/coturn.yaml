# coturn — TURN server for Element voice/video (WebRTC NAT traversal).
# ArgoCD-managed. Requires the out-of-band `coturn-secret` (apply-secrets.sh).
#
# Networking note (tow-c1): the LKE nodes have NO Linode Cloud Firewall
# attached, so node public IPs are open — no firewall rules needed. coturn uses
# hostNetwork to bind a node's public IP directly:
#     3478/udp + 3478/tcp   TURN control
#     49160-49200/udp       relay range (matches --min/--max-port below)
#
# FRAGILITY: pinned to a specific node via nodeName so its public IP is stable
# and matches turn_uris in secret-synapse.yaml. If that node is recycled/removed,
# update BOTH nodeName here and turn_uris in secret-synapse.yaml to the new node.
#   node: lke484433-700897-00b7001f0000  ->  172.234.239.87
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: matrix
  labels:
    app: coturn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeName: lke484433-700897-00b7001f0000
      containers:
        - name: coturn
          image: coturn/coturn:4.6
          imagePullPolicy: IfNotPresent
          args:
            - "-n"
            - "--log-file=stdout"
            - "--use-auth-secret"
            - "--realm=matrix.kodloki.io"
            - "--listening-port=3478"
            - "--min-port=49160"
            - "--max-port=49200"
            - "--no-cli"
            - "--no-tls"
            - "--no-dtls"
            # Lock down relay abuse on a public-IP TURN server. (Loopback peers
            # are denied by default in coturn 4.6, so no flag needed for that.)
            - "--no-multicast-peers"
          env:
            - name: TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: coturn-secret
                  key: TURN_SECRET
          # Inject the shared secret via flag from env (kept out of the manifest).
          command: ["sh", "-c", "exec turnserver --static-auth-secret=$TURN_SECRET \"$@\"", "--"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      restartPolicy: Always
